name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rateshield
          POSTGRES_PASSWORD: rateshield_pass
          POSTGRES_DB: rateshield_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rateshield -d rateshield_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://rateshield:rateshield_pass@localhost:5432/rateshield_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      WEATHER_URL: ${{ secrets.WEATHER_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Verify Redis
        run: |
          python - <<EOF
          import redis
          r = redis.Redis.from_url("redis://localhost:6379")
          print("Redis PING:", r.ping())
          EOF

      - name: Run tests
        run: pytest -vv --maxfail=1

